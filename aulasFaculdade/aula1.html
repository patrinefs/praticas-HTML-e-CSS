<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titulos, listas e Ola Mundo</title>
</head>
<body>
    <h1>Ola Mundo + Titulo 1</h1>
    <h2>Titulo 2</h2>
    <h3>Titulo 3</h3>
    <h4>Titulo 4</h4>
    <h5>Titulo 5</h5>
    <h6>Titulo 6</h6>
</body>
<h2>Lista não numerada/não ordenada</h2>
<ul>
    <li>Item 1</li>
    <li>Item 2</li>
    <li>Item 3</li>
</ul>
<h2>Lista numerada/ordenada</h2>
<ol>
    <li>Item 5</li>
    <li>Item 6</li>
    <li>Item 7</li>
</ol>
</html>
